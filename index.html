<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de Bolsos</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script src="scriptReload.js"></script>

    <link rel="icon" href="orange.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

</head>
<body>

    <div id="father" class="fatherSize">
        <div id="child ">

            <p>
            <select id="fruit" class="fontSize">
              <option value="Man.Base">Bolso Mandarina base</option>
              <option value="Nar.Base">Bolso Naranja Base</option>
              <option value="true">Negativo</option>
            </select>

            <select id="type" class="fontSize">
                <option value="Tijera">Tijera</option>
                <option value="Mano">Mano</option>
                <option value="Selección">Selección</option>
            </select>
            </p>

            <p>
            <input type="text" class="fontSize" id="quantity" placeholder="Cantidad de bolsos"/>
            <button id="button" class="fontSize" onclick="callResult()">Calcular</button>
            </p>
            
            <p class="fontResult" id="showResult">
            </p>

            <label for="date" class="fontSize">Fecha:</label>
            <input type="date" id="date" class="fontSize"/>
            <button id="button" class="fontSize" onclick="saveWeek()">Guardar</button>

            <p class="fontResult">Menores a cargo
               <select id ="kids">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
               </select>
               Horas Extras
               <select id ="hours">
                    <option value="0">0</option>
                    <option value="0.5">1/2</option>
                    <option value="1">1</option>
                    <option value="1.5">1 y 1/2</option>
                    <option value="2">2</option>
               </select>
            </p>
            
        </div>
    </div>   
 
    <div id="father1" class="fatherSize">

        <div id="child1">
            
            <p id="titleDate"> 
            </p>

            <div id="result">
                <table id="tableFirst" class="fontSize">
                    <thead id ="tHead">
                      <tr>
                          <th>Fecha</th>
                          <th>Tipo</th>
                          <th>Tipo Fruta</th>
                          <th>Bolsos</th>
                          <th>Bruto</th>
                          <th>Líquido</th>
                      </tr>
                    </thead>
                    <tbody id="tBody">

                    </tbody>
                </table>
            </div>
            <p id="finalResult" class="fontResult"><br></p>
        </div>
    </div>
    <div id="father2" class="fatherSize">
        <div id="child2">
            <p id="center">
                <select id ="selectTable">
                    <option value="weekend" disable selected hidden>SemanasGuardadas</option>
                </select>
            </p>
            <p id="titleSaved" class="fontSize">
            </p>
                <div id="resultSaved">
                    <table id="tableSaved" class="fontSize">
                        <thead id ="tHeadSaved">
                        <tr>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th>Tipo Fruta</th>
                            <th>Bolsos</th>
                            <th>Bruto</th>
                            <th>Líquido</th>
                        </tr>
                        </thead>
                        <tbody id="tBodySaved">
                        </tbody>
                    </table>    
        </div>
      <p id="totalWeek" class="fontResult"><br></p>
    </div>
</body>
</html>
